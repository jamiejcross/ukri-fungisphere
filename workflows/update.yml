name: Refresh GTR Data

on:
  # Run every Monday at 06:00 UTC
  schedule:
    - cron: "0 6 * * 1"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated CSVs back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run GTR data updater
        run: python update_data.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/active_mould_fungi_projects.csv \
                  data/active_mould_fungi_social_science.csv \
                  data/metadata.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: auto-refresh GTR data [$(date -u +%Y-%m-%d)]"
          git push
